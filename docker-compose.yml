version: '3'

services:
  rsshub:
    image: diygod/rsshub:latest
    restart: always
    ports:
      - '1200:1200'
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/0
      ZHIHU_COOKIES: ${ZHIHU_COOKIES}
      XIAOHONGSHU_COOKIE: ${XIAOHONGSHU_COOKIE}
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  redis-data:
